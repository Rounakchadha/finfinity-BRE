name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run build --workspace=packages/bre-engine
      - run: npx tsc --noEmit --project apps/web/tsconfig.json
      - run: npx tsc --noEmit --project apps/api/tsconfig.json

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run lint --workspace=apps/web --if-present
      - run: npm run lint --workspace=apps/api --if-present
