version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finfinity_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finfinity
      POSTGRES_PASSWORD: finfinitypass
      POSTGRES_DB: finfinity_bre
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finfinity"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finfinity_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    container_name: finfinity_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://finfinity:finfinitypass@postgres:5432/finfinity_bre
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-prod
      JWT_EXPIRES_IN: 7d
      DEMO_MODE: "true"
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api:/app/apps/api
      - ../packages:/app/packages
      - /app/apps/api/node_modules

  web:
    build:
      context: ../
      dockerfile: docker/Dockerfile.web
    container_name: finfinity_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NEXT_PUBLIC_DEMO_MODE: "true"
    depends_on:
      - api
    volumes:
      - ../apps/web:/app/apps/web
      - /app/apps/web/node_modules

volumes:
  postgres_data:
  redis_data:
